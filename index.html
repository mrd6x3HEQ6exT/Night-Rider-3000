<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Night Rider 3000 — Astro Session Planner</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#070A12">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Night Rider">
<meta name="description" content="Astrophotography session planner — visibility windows, exposure math, projects, and NINA integration.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=Barlow+Condensed:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070A12; --panel:#0E1420; --panel2:#131B2A; --panel3:#182238;
  --line:#1E2A3E; --line2:#2A3A55;
  --text:#C7D3E4; --dim:#7B8AA3; --faint:#54617A;
  --amber:#E8B84B; --amber-dim:#8F7330;
  --good:#4FBF7A; --warn:#E0A030; --bad:#E05A4E;
  --ha:#E05A4E; --oiii:#3FBFB4; --sii:#E0A030; --lum:#D8DEE9;
  --red:#D9534F; --grn:#5CB85C; --blu:#4F8FE0; --bb:#9B7FD4; --db:#C56BD6;
  --mono:'IBM Plex Mono',ui-monospace,Consolas,monospace;
  --sans:'IBM Plex Sans',system-ui,Segoe UI,sans-serif;
  --disp:'Barlow Condensed','IBM Plex Sans',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font:14px/1.45 var(--sans);overflow:hidden}
#nightwrap{height:100%;display:flex;flex-direction:column}
body.redmode #nightwrap{filter:sepia(1) saturate(4) hue-rotate(-38deg) brightness(.72) contrast(1.05)}
#kitt-scanner{display:none;width:64px;height:8px;background:#1a0605;border-radius:4px;position:relative;overflow:hidden;border:1px solid #4a1512;margin-left:4px}
body.redmode #kitt-scanner{display:block}
#kitt-dot{position:absolute;top:0;left:0;width:18px;height:100%;border-radius:4px;
  background:radial-gradient(ellipse at center,#ff3b2f 0%,#ff3b2f 40%,rgba(255,59,47,0) 80%);
  box-shadow:0 0 10px 3px rgba(255,59,47,.85);
  animation:kittsweep 1.1s ease-in-out infinite alternate;}
@keyframes kittsweep{ from{ left:0; } to{ left:46px; } }
@media (prefers-reduced-motion: reduce){ #kitt-dot{ animation-duration:3.5s; } }
/* Blue swish for the main screen — always visible, deliberately calmer than the red night-vision one
   (dimmer glow, slower sweep) so it reads as ambient flavor, not a distraction */
.kitt-scanner-blue{width:70px;height:9px;background:#0a1420;border-radius:4px;position:relative;overflow:hidden;border:1px solid #234570;display:inline-block;vertical-align:middle;margin-left:10px}
.kitt-dot-blue{position:absolute;top:0;left:0;width:20px;height:100%;border-radius:4px;
  background:radial-gradient(ellipse at center,var(--blu) 0%,var(--blu) 40%,rgba(79,143,224,0) 80%);
  box-shadow:0 0 9px 2px rgba(79,143,224,.7);
  animation:kittsweepblue 1.4s ease-in-out infinite alternate;}
@keyframes kittsweepblue{ from{ left:0; } to{ left:50px; } }
@media (prefers-reduced-motion: reduce){ .kitt-dot-blue{ animation-duration:4.5s; } }

/* Top bar */
#topbar{display:flex;align-items:center;gap:14px;padding:8px 16px;background:var(--panel);border-bottom:1px solid var(--line);flex-shrink:0}
#topbar h1{font:600 22px/1 var(--disp);letter-spacing:.06em;color:var(--amber);text-transform:uppercase}
#topbar h1 span{color:var(--dim);font-weight:500}
#nightpick{display:flex;align-items:center;gap:6px;margin-left:10px}
#nightpick input[type=date]{background:var(--panel2);border:1px solid var(--line2);color:var(--text);font:13px var(--mono);padding:4px 6px;border-radius:4px;color-scheme:dark}
.tbarstat{font:12px var(--mono);color:var(--dim);display:flex;align-items:center;gap:5px;white-space:nowrap}
.tbarstat b{color:var(--text);font-weight:500}
#topbar .spacer{flex:1}
.moonface{font-size:16px}
#profilesel{background:var(--panel2);border:1px solid var(--line2);color:var(--amber);font:500 13px var(--sans);padding:4px 8px;border-radius:4px}
button{cursor:pointer;font-family:var(--sans)}
.btn{background:var(--panel2);border:1px solid var(--line2);color:var(--text);padding:5px 11px;border-radius:4px;font-size:13px}
.btn:hover{background:var(--panel3);border-color:var(--amber-dim)}
.btn.primary{background:var(--amber);border-color:var(--amber);color:#141005;font-weight:600}
.btn.primary:hover{background:#F2C65E}
.btn.small{padding:2px 8px;font-size:12px}
.btn.danger{border-color:var(--bad);color:var(--bad)}
.btn:disabled{opacity:.45;cursor:default}

/* Layout */
#main{display:flex;flex:1;min-height:0}
#sidebar{width:170px;background:var(--panel);border-right:1px solid var(--line);padding:10px 0;flex-shrink:0;display:flex;flex-direction:column}
.navbtn{display:block;width:100%;text-align:left;background:none;border:none;border-left:3px solid transparent;color:var(--dim);padding:9px 16px;font:500 14px var(--sans)}
.navbtn:hover{color:var(--text)}
.navbtn.active{color:var(--amber);border-left-color:var(--amber);background:linear-gradient(90deg,rgba(232,184,75,.08),transparent)}
#sidebar .foot{margin-top:auto;padding:10px 14px;font:11px var(--mono);color:var(--faint)}
#content{flex:1;overflow-y:auto;padding:16px 20px}
.page{display:none;max-width:1280px}
.page.active{display:block}

h2{font:600 20px var(--disp);letter-spacing:.05em;text-transform:uppercase;color:var(--text);margin-bottom:4px}
h3{font:600 15px var(--disp);letter-spacing:.06em;text-transform:uppercase;color:var(--amber);margin:0 0 8px}
.sub{color:var(--dim);font-size:13px;margin-bottom:14px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:14px;margin-bottom:14px}
.card.tight{padding:10px 12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:1000px){.grid2,.grid3{grid-template-columns:1fr}}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.mono{font-family:var(--mono)}
.dim{color:var(--dim)} .faint{color:var(--faint)} .amber{color:var(--amber)}
.good{color:var(--good)} .warn{color:var(--warn)} .bad{color:var(--bad)}
.right{text-align:right}
hr.sep{border:none;border-top:1px solid var(--line);margin:12px 0}

/* Tables */
table{width:100%;border-collapse:collapse;font-size:13px}
th{font:600 11px var(--sans);text-transform:uppercase;letter-spacing:.07em;color:var(--dim);text-align:left;padding:6px 8px;border-bottom:1px solid var(--line2)}
td{padding:6px 8px;border-bottom:1px solid var(--line);font-family:var(--mono);font-size:12.5px}
tr:hover td{background:rgba(232,184,75,.03)}
td.sans{font-family:var(--sans);font-size:13px}
tfoot td{border-top:2px solid var(--line2);border-bottom:none;color:var(--amber);font-weight:500}

/* Forms */
label.f{display:block;font:600 11px var(--sans);text-transform:uppercase;letter-spacing:.06em;color:var(--dim);margin:8px 0 3px}
input[type=text],input[type=number],input[type=password],input[type=time],select,textarea{background:var(--panel2);border:1px solid var(--line2);color:var(--text);font:13px var(--mono);padding:5px 8px;border-radius:4px;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--amber-dim)}
input.short{width:90px} input.mid{width:150px}
select{font-family:var(--sans)}
textarea{font-family:var(--mono);resize:vertical}
.unconfirmed{border-color:var(--warn)!important;background:rgba(224,160,48,.07)!important}
.fieldnote{font-size:11px;color:var(--faint);margin-top:2px}

/* Toggle switches */
.tog{display:inline-flex;align-items:center;gap:8px;cursor:pointer;user-select:none;font-size:13px;color:var(--text)}
.tog input{display:none}
.tog .tr{width:34px;height:18px;background:var(--panel3);border:1px solid var(--line2);border-radius:10px;position:relative;transition:.15s;flex-shrink:0}
.tog .tr::after{content:'';position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:var(--dim);transition:.15s}
.tog input:checked + .tr{background:var(--amber-dim);border-color:var(--amber)}
.tog input:checked + .tr::after{left:18px;background:var(--amber)}

/* Filter chips */
.chip{display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:10px;font:500 11.5px var(--mono);border:1px solid var(--line2);background:var(--panel2)}
.chip .dot{width:8px;height:8px;border-radius:50%}
.badge{display:inline-block;padding:1px 7px;border-radius:9px;font:600 10.5px var(--sans);text-transform:uppercase;letter-spacing:.05em}
.badge.ok{background:rgba(79,191,122,.15);color:var(--good)}
.badge.wn{background:rgba(224,160,48,.15);color:var(--warn)}
.badge.bd{background:rgba(224,90,78,.15);color:var(--bad)}
.badge.nt{background:var(--panel3);color:var(--dim)}

/* Timeline */
#tl-wrap{position:relative;overflow-x:auto}
#tl-svg{display:block}
.tl-tip{position:fixed;pointer-events:none;background:var(--panel3);border:1px solid var(--line2);border-radius:5px;padding:6px 9px;font:12px var(--mono);color:var(--text);z-index:50;display:none;max-width:320px;box-shadow:0 4px 16px rgba(0,0,0,.5)}

/* Progress bars */
.pbar{height:8px;background:var(--panel3);border-radius:4px;overflow:hidden}
.pbar > div{height:100%;border-radius:4px}

/* Modal */
#modal-bg{position:fixed;inset:0;background:rgba(3,5,10,.75);display:none;align-items:flex-start;justify-content:center;z-index:100;overflow-y:auto;padding:5vh 20px}
#modal-bg.open{display:flex}
#modal{background:var(--panel);border:1px solid var(--line2);border-radius:10px;padding:18px;width:min(680px,94vw);box-shadow:0 12px 48px rgba(0,0,0,.6)}
#modal h3{margin-bottom:10px}

/* AI output */
.ai-out{background:var(--panel2);border:1px solid var(--line);border-radius:6px;padding:12px;font-size:13.5px;white-space:pre-wrap;max-height:560px;overflow-y:auto}
.ai-out table{margin:8px 0}
.spin{display:inline-block;width:13px;height:13px;border:2px solid var(--amber-dim);border-top-color:var(--amber);border-radius:50%;animation:sp .8s linear infinite;vertical-align:-2px}
@keyframes sp{to{transform:rotate(360deg)}}
@media (prefers-reduced-motion: reduce){.spin{animation-duration:2s}}

.toast{position:fixed;bottom:18px;right:18px;background:var(--panel3);border:1px solid var(--amber-dim);border-radius:6px;padding:10px 14px;font-size:13px;z-index:200;max-width:380px;box-shadow:0 6px 24px rgba(0,0,0,.5)}
.toast.err{border-color:var(--bad)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--panel3);border-radius:5px}
::-webkit-scrollbar-track{background:var(--panel)}
.klist{display:flex;flex-wrap:wrap;gap:6px 16px;font:12px var(--mono);color:var(--dim)}
.klist b{color:var(--text);font-weight:500}
details.adv{margin-top:8px}
details.adv summary{cursor:pointer;color:var(--dim);font-size:12px}
</style>
</head>
<body>
<div id="nightwrap">
<div id="topbar">
  <h1>Night <span>Rider 3000</span></h1>
  <div id="kitt-scanner"><div id="kitt-dot"></div></div>
  <div id="nightpick"><span class="tbarstat">Night of</span><input type="date" id="nightdate"></div>
  <div class="tbarstat" id="tb-dark"></div>
  <div class="tbarstat" id="tb-moon"></div>
  <div class="spacer"></div>
  <select id="profilesel" title="Active equipment profile"></select>
  <label class="tog" title="Red screen mode to preserve night vision"><input type="checkbox" id="redmode"><span class="tr"></span>Red</label>
</div>
<div id="main">
  <nav id="sidebar">
    <button class="navbtn active" data-page="tonight">Tonight</button>
    <button class="navbtn" data-page="planner">Planner</button>
    <button class="navbtn" data-page="targets">Targets</button>
    <button class="navbtn" data-page="projects">Projects</button>
    <button class="navbtn" data-page="lab">Exposure Lab</button>
    <button class="navbtn" data-page="advisor">AI Advisor</button>
    <button class="navbtn" data-page="equipment">Equipment</button>
    <button class="navbtn" data-page="settings">Settings</button>
    <div class="foot">31.5359 −110.2965<br>SQM 19.70 · B5.7<br><span id="foot-clock"></span></div>
  </nav>
  <div id="content">
    <div class="page active" id="page-tonight"></div>
    <div class="page" id="page-planner"></div>
    <div class="page" id="page-targets"></div>
    <div class="page" id="page-projects"></div>
    <div class="page" id="page-lab"></div>
    <div class="page" id="page-advisor"></div>
    <div class="page" id="page-equipment"></div>
    <div class="page" id="page-settings"></div>
  </div>
</div>
</div>
<div id="modal-bg"><div id="modal"></div></div>
<div class="tl-tip" id="tltip"></div>

function loadState(){
  try{
    const raw = localStorage.getItem('nightrider') || localStorage.getItem('nightshift');
    if(raw && !localStorage.getItem('nightrider')){ localStorage.setItem('nightrider', raw); localStorage.removeItem('nightshift'); } // one-time migration from the old name
    if(!raw) return structuredClone(DEFAULT_STATE);
    const s = JSON.parse(raw);
    // shallow-merge new default keys forward
    for(const k of Object.keys(DEFAULT_STATE)) if(!(k in s)) s[k]=structuredClone(DEFAULT_STATE[k]);
    for(const k of Object.keys(DEFAULT_STATE.toggles)) if(!(k in s.toggles)) s.toggles[k]=DEFAULT_STATE.toggles[k];
    return s;
  }catch(e){ console.error('state load failed',e); return structuredClone(DEFAULT_STATE); }
}

function fmtHM(d){ return d ? d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',hour12:false}) : '—'; }
function fmtDur(min){ if(min==null||isNaN(min)) return '—'; const h=Math.floor(min/60), m=Math.round(min%60); return (h?h+'h ':'')+(m||!h?m+'m':''); }
function fmtRA(ra){ const h=Math.floor(ra), m=(ra-h)*60; return h+'h '+m.toFixed(1)+'m'; }

/* Night anchor: "night of" date D = local noon D to local noon D+1 */
function nightBounds(dateStr){
  const [y,m,d] = dateStr.split('-').map(Number);
  const start = new Date(y, m-1, d, 12, 0, 0);
  const end = new Date(start.getTime()+24*3600e3);
  return {start, end};
}
function searchSunAlt(alt, dir, t0, limitDays){
  try{ const r = A.SearchAltitude(A.Body.Sun, observer(), dir, A.MakeTime(t0), limitDays, alt); return r?r.date:null; }
  catch(e){ return null; }
}
/* Sun + moon events for the night */
function nightEvents(dateStr){

  ev.dusk12      = searchSunAlt(-12,-1,start,1);

  ev.dawn12      = ev.dawn18? searchSunAlt(-12,+1,ev.dawn18,1) : searchSunAlt(-12,+1,start,1.2);
  ev.sunrise     = searchSunAlt(-0.833,+1,ev.dusk18||start,1.2);
  const obs=observer();
  const mrise = A.SearchRiseSet(A.Body.Moon, obs, +1, A.MakeTime(start), 1.2);
  const mset  = A.SearchRiseSet(A.Body.Moon, obs, -1, A.MakeTime(start), 1.2);
  ev.moonrise = mrise?mrise.date:null; ev.moonset = mset?mset.date:null;
  const mid = ev.dusk18 && ev.dawn18 ? new Date((ev.dusk18.getTime()+ev.dawn18.getTime())/2) : new Date(start.getTime()+9*3600e3);
  const ill = A.Illumination(A.Body.Moon, A.MakeTime(mid));
  ev.moonIllum = ill.phase_fraction;
  ev.moonPhaseAngle = A.MoonPhase(A.MakeTime(mid));

}
function moonEmoji(phaseDeg){
  const idx = Math.round(phaseDeg/45)%8;

/* J2000 ra(h)/dec(deg) -> alt/az at time */
function altAz(raH, dec, date){
  const t=A.MakeTime(date);
  const v=A.VectorFromSphere(new A.Spherical(dec, raH*15, 1), t);
  const e=A.SphereFromVector(A.RotateVector(A.Rotation_EQJ_EQD(t), v));
  return A.Horizon(t, observer(), e.lon/15, e.lat, 'normal');
}
function moonPos(date){
  const t=A.MakeTime(date);
  const eq=A.Equator(A.Body.Moon, t, observer(), true, true);
  const hor=A.Horizon(t, observer(), eq.ra, eq.dec, 'normal');
  return {ra:eq.ra, dec:eq.dec, alt:hor.altitude, az:hor.azimuth};
}
function angSep(ra1,d1,ra2,d2){
  const c = Math.sin(d1*D2R)*Math.sin(d2*D2R)+Math.cos(d1*D2R)*Math.cos(d2*D2R)*Math.cos((ra1-ra2)*15*D2R);
  return Math.acos(Math.min(1,Math.max(-1,c)))/D2R;
}
/* Local horizon altitude at azimuth (from imported .hrz or flat 0) */
function horizonAlt(az){
  const H=S.horizon; if(!H||!H.length) return 0;
  az=((az%360)+360)%360;
  let lo=H[H.length-1], hi=H[0];
  for(let i=0;i<H.length;i++){ if(H[i].az<=az) lo=H[i]; if(H[i].az>=az){ hi=H[i]; break; } }
  if(lo.az>hi.az){ // wrap
    const span=(hi.az+360-lo.az)||1; const f=(((az-lo.az)+360)%360)/span;
    return lo.alt+(hi.alt-lo.alt)*f;
  }
  const span=hi.az-lo.az||1; const f=(az-lo.az)/span;
  return lo.alt+(hi.alt-lo.alt)*f;
}
/* Sample a target across the night; compute visibility windows */
function targetNight(tgt, ev, opts){
  opts = opts||{};
  const altFloor = opts.altFloor ?? S.session.altFloor;
  const moonSep = opts.moonSep ?? S.session.moonSepDefault;
  const hzOff = S.session.horizonOffset;
  const t0 = opts.twilight==='nautical' ? (ev.dusk12||ev.sunset||ev.start) : (ev.dusk18||ev.sunset||ev.start);
  const t1 = opts.twilight==='nautical' ? (ev.dawn12||ev.sunrise||ev.end) : (ev.dawn18||ev.sunrise||ev.end);
  if(!t0||!t1) return {samples:[],windows:[],transit:null};
  const step=5*60e3, samples=[];
  for(let t=t0.getTime(); t<=t1.getTime(); t+=step){
    const d=new Date(t);
    const h=altAz(tgt.ra,tgt.dec,d);
    const m=moonPos(d);
    const sep=angSep(tgt.ra,tgt.dec,m.ra,m.dec);
    const okAlt = h.altitude>=altFloor && h.altitude>=horizonAlt(h.azimuth)+hzOff;
    const okMoon = m.alt<=0 || sep>=moonSep;
    samples.push({t:d, alt:h.altitude, az:h.azimuth, moonAlt:m.alt, moonSep:sep, ok:okAlt&&okMoon, okAlt, okMoon});
  }
  // windows
  const windows=[]; let w=null;
  for(const s of samples){
    if(s.ok && !w) w={from:s.t, to:s.t, peakAlt:s.alt};
    if(s.ok && w){ w.to=s.t; w.peakAlt=Math.max(w.peakAlt,s.alt); }
    if(!s.ok && w){ windows.push(w); w=null; }
  }
  if(w) windows.push(w);
  for(const win of windows) win.minutes=(win.to-win.from)/60e3;
  // transit within night: LST == RA
  let transit=null, best=1e9;
  for(const s of samples){
    const gast=A.SiderealTime(A.MakeTime(s.t));
    let lst=(gast + S.location.lon/15 + 24)%24;
    let dh=Math.abs(lst-tgt.ra); dh=Math.min(dh,24-dh);
    if(dh<best){best=dh; transit=s.t;}
  }
  if(best>0.6) transit=null; // transit not during darkness
  return {samples, windows, transit};
}
/* Trim a buffer around meridian flip out of a window list; returns {windows, lostMin} */
function applyFlipCost(windows, transit, costMin){
  if(!transit || !costMin) return {windows, lostMin:0};
  const half=costMin*60e3/2; const lo=new Date(transit-half), hi=new Date(transit+half);
  const out=[]; let lost=0;
  for(const w of windows){
    if(hi<=w.from || lo>=w.to){ out.push(w); continue; }
    if(lo>w.from){ const seg={from:w.from, to:new Date(Math.min(lo,w.to)), peakAlt:w.peakAlt}; seg.minutes=(seg.to-seg.from)/60e3; if(seg.minutes>0) out.push(seg); }
    if(hi<w.to){ const seg={from:new Date(Math.max(hi,w.from)), to:w.to, peakAlt:w.peakAlt}; seg.minutes=(seg.to-seg.from)/60e3; if(seg.minutes>0) out.push(seg); }
    lost += Math.min(w.minutes, costMin) ;
  }
  return {windows:out, lostMin:lost};
}
/* Windows for a filter kind, respecting nautical-twilight opt-in for broadband, plus flip-cost trim */
function filterWindows(t, ev, tp, filt){
  const useNautical = S.session.nauticalBroadband && ['broadband','triband','rgb'].includes(filt.kind);
  const tn = targetNight(t, ev, {moonSep:tp.moonSep, twilight: useNautical?'nautical':'astro'});
  const fc = applyFlipCost(tn.windows, tn.transit, S.session.flipCostMin);
  const minutes = fc.windows.reduce((a,w)=>a+w.minutes,0);
  return {windows:fc.windows, minutes, lostMin:fc.lostMin, transit:tn.transit, extended:useNautical};
}

/* ============ Sky brightness & SNR physics ============ */
/* Photon zero point: ~8.79e5 photons s^-1 cm^-2 per mag-0 across broad visible band.
   Approximate model, clearly labeled; all inputs editable. */
const N0 = 8.79e5;
function pixScale(prof){ return 206.265*prof.camera.pixelUm/prof.scope.focalLength; }
function apertureCm2(prof){ const d=prof.scope.aperture/10; return Math.PI*d*d/4; }
/* Resolves the effective camera physics for a given filter, honoring per-filter gain overrides
   (e.g. mono LRGB @ gain 0 vs narrowband @ gain 100 — two real operating points, not one). */
function filterCam(prof, filt){
  const c=prof.camera;
  return {
    gain: filt.gain ?? c.gain,
    offset: filt.offset ?? c.offset,
    readNoise: filt.readNoise ?? c.readNoise,
    fullWell: filt.fullWell ?? c.fullWell,
  };
}
function fovDeg(prof){
  const s=pixScale(prof);
  return {w:s*prof.camera.w/3600, h:s*prof.camera.h/3600, scale:s};
}
/* Effective sky SQM including moon (approximate Krisciunas–Schaefer-flavored model) */
function skySQM(moonIllum, moonAlt, moonSep){
  const dark=S.location.sqm;
  if(moonAlt<=0 || moonIllum<=0.005) return dark;
  // moon-lit sky component brightness (mag/arcsec^2): brighter with illumination,
  // proximity, and moon altitude. Anchored so full moon @45° sep ≈ SQM 18.
  let mMoon = 18.0 + 2.5*Math.log10(1/Math.max(0.01,moonIllum));
  mMoon += Math.max(0,(moonSep-45))/45*1.3;      // fades with separation
  mMoon -= Math.max(0,(45-moonSep))/45*1.0;      // brightens close to moon
  mMoon += (1-Math.sin(Math.max(5,moonAlt)*D2R))*0.8; // low moon → less skyglow
  const f = Math.pow(10,-0.4*dark)+Math.pow(10,-0.4*mMoon);
  return -2.5*Math.log10(f);
}
/* Sky electron rate per pixel per second through a filter */
function skyRate(prof, filt, sqm){
  const s=pixScale(prof);
  return N0*Math.pow(10,-0.4*sqm)*apertureCm2(prof)*(s*s)*prof.camera.qe*filt.skyFrac;
}
/* Optimal sub length (read-noise swamping): t = C·RN²/skyRate */
function optimalSub(prof, filt, sqm, tolPct){
  const tol=(tolPct??S.session.noiseTolerance)/100;
  const C = 1/((1+tol)*(1+tol)-1);
  const R = skyRate(prof, filt, sqm);
  const rn=filterCam(prof,filt).readNoise;
  const t = C*rn*rn/Math.max(R,1e-9);
  return {t, R, C};
}
function snapToDarks(t, darks){
  if(!darks||!darks.length) return {snap:t, gap:0};
  let best=darks[0], bl=1e9;
  for(const d of darks){ const l=Math.abs(Math.log(d/t)); if(l<bl){bl=l;best=d;} }
  return {snap:best, ratio:best/t};
}
/* Stacked SNR for a target of surface brightness sb over total integration hours */
function stackSNR(prof, filt, sqm, sb, subLen, hours){
  const s=pixScale(prof);
  const sig = N0*Math.pow(10,-0.4*sb)*apertureCm2(prof)*(s*s)*prof.camera.qe*Math.min(filt.skyFrac*4,1); // line emission concentrates in band
  const sky = skyRate(prof, filt, sqm);
  const rn=filterCam(prof,filt).readNoise, dc=prof.camera.darkCurrent;
  const n = Math.max(1, Math.floor(hours*3600/subLen));
  const t=subLen;
  const snr1 = sig*t/Math.sqrt(sig*t + sky*t + dc*t + rn*rn);
  return snr1*Math.sqrt(n);
}
/* Noise penalty of using sub length t vs ideal (percent extra stack noise) */
function noisePenalty(prof, filt, sqm, t){
  const R=skyRate(prof,filt,sqm), rn=filterCam(prof,filt).readNoise;
  return (Math.sqrt(1+rn*rn/(R*t))-1)*100;
}

/* Tolerant parser: find hourly series for cloud / transparency / seeing */
function parseWeather(data){
  if(!data) return null;
  const out={start:null, hours:[]};
  // find forecast start time
  for(const k of Object.keys(data)){
    if(/start.*time|time.*start/i.test(k) && (typeof data[k]==='string'||typeof data[k]==='number')){
      const d=new Date(data[k]); if(!isNaN(d)) {out.start=d; break;}
    }
  }
  const series={};
  function scan(obj,path){
    if(!obj||typeof obj!=='object') return;
    for(const [k,v] of Object.entries(obj)){
      const p=path?path+'.'+k:k;
      if(Array.isArray(v) && v.length>4){
        const key=/cloud/i.test(p)?'cloud':/transp/i.test(p)?'transparency':/seeing/i.test(p)?'seeing':/wind/i.test(p)&&!/direction/i.test(p)?'wind':/dew/i.test(p)?'dew':/temp/i.test(p)?'temp':null;
        if(key && !series[key]){
          series[key]=v.map(x=>{
            if(x==null) return null;
            if(typeof x==='number') return x;
            if(typeof x==='object'){ for(const kk of ['Value','value','Raw','raw','Data','data']) if(typeof x[kk]==='number') return x[kk]; }
            return null;
          });
        }
      } else if(typeof v==='object') scan(v,p);
    }
  }
  scan(data,'');
  out.series=series;
  const n=Math.max(...Object.values(series).map(a=>a.length),0);
  out.n=n;
  return out;
}
/* Cloud fraction (0..1) at a Date, or null */
function cloudAt(date){
  const c=S.weatherCache; if(!c||!c.data) return null;
  const p=parseWeather(c.data); if(!p||!p.series.cloud||!p.start) return null;
  const idx=Math.floor((date-p.start)/3600e3);
  if(idx<0||idx>=p.series.cloud.length) return null;
  const v=p.series.cloud[idx];
  return v==null?null:(v>1? v/100 : v);
}

/* Ground-truth context block fed to every AI call */
function groundContext(dateStr, targetIds, constraints){
  const ev=nightEvents(dateStr); const prof=profile(); const fov=fovDeg(prof);
  const L=[];
  L.push(`LOCATION: ${S.location.name} (${S.location.lat}, ${S.location.lon}), SQM ${S.location.sqm} (Bortle ${S.location.bortle})`);
  L.push(`NIGHT OF ${dateStr}: astro dark ${fmtHM(ev.dusk18)} to ${fmtHM(ev.dawn18)} local. Moon ${(ev.moonIllum*100).toFixed(0)}% illuminated; moonrise ${fmtHM(ev.moonrise)}, moonset ${fmtHM(ev.moonset)}.`);
  L.push(`RIG: ${prof.name} — ${prof.scope.name} ${prof.scope.aperture}mm f/${(prof.scope.focalLength/prof.scope.aperture).toFixed(1)} FL ${prof.scope.focalLength}mm; ${prof.camera.name} gain ${prof.camera.gain} offset ${prof.camera.offset}, read noise ~${prof.camera.readNoise}e-; scale ${fov.scale.toFixed(2)}"/px, FOV ${fov.w.toFixed(1)}°×${fov.h.toFixed(1)}°. Mount ${prof.mount}. Guiding ${prof.guiding}.`);

  const mid=ev.mid;
  for(const f of prof.filters){
    const m=moonPos(mid);
    const sepRef = targetIds&&targetIds.length ? angSep(getTarget(targetIds[0]).ra,getTarget(targetIds[0]).dec,m.ra,m.dec) : 90;
    const sqm=skySQM(ev.moonIllum, m.alt, sepRef);
    const o=optimalSub(prof,f,sqm);
    const sn=snapToDarks(o.t,prof.darks);
    L.push(`  ${f.short} [${f.kind}]: sky ${o.R.toFixed(3)} e-/px/s @ eff SQM ${sqm.toFixed(2)}; ideal sub ${o.t.toFixed(0)}s -> snapped ${sn.snap}s (noise penalty ${noisePenalty(prof,f,sqm,sn.snap).toFixed(1)}%). Flat: brightness ${f.flatBright??'unset'}%${f.flatExp?', '+f.flatExp+'s':''}.`);
  }
  if(targetIds&&targetIds.length){
    L.push(`TARGETS (windows computed against altitude floor ${S.session.altFloor}°, custom horizon${S.horizon?' (imported)':' (none)'}, moon separation ${constraints&&constraints.moonSep?constraints.moonSep:S.session.moonSepDefault}°):`);
    for(const id of targetIds){
      const t=getTarget(id); if(!t) continue;
      const tn=targetNight(t,ev,constraints||{});
      const w=tn.windows.map(w=>`${fmtHM(w.from)}–${fmtHM(w.to)} (${fmtDur(w.minutes)}, peak ${w.peakAlt.toFixed(0)}°)`).join('; ')||'no usable window';
      const m=moonPos(ev.mid);
      L.push(`  ${t.id} ${t.n} [${TYPE_NAMES[t.type]||t.type}, ${t.size}' , palette ${t.pal}]: ${w}. Transit ${tn.transit?fmtHM(tn.transit)+' (meridian flip)':'outside dark hours'}. Moon sep ~${angSep(t.ra,t.dec,m.ra,m.dec).toFixed(0)}°.`);
      const proj=S.projects.find(p=>p.targetId===id);
      if(proj){
        const st=projectStatus(proj);
        L.push(`    PROJECT "${proj.name}": `+st.map(r=>`${r.short} ${r.done}/${r.goal} subs @${r.exp}s (${r.pct}%)`).join(', '));
      }
    }
  } else {
    // No explicit targets picked (e.g. "what should I shoot tonight") — auto-surface real
    // candidates from the full catalog instead of sending the AI nothing to recommend from.
    const ranked=allTargets().map(t=>{
      const tn=targetNight(t,ev,constraints||{});
      const minutes=tn.windows.reduce((a,w)=>a+w.minutes,0);
      return {t,tn,minutes};
    }).filter(r=>r.minutes>0).sort((a,b)=>b.minutes-a.minutes).slice(0,18);
    L.push(`CATALOG CANDIDATES (top ${ranked.length} of the full catalog by tonight's usable minutes — auto-selected, not a pre-committed plan; windows computed against altitude floor ${S.session.altFloor}°, custom horizon${S.horizon?' (imported)':' (none)'}, moon separation ${constraints&&constraints.moonSep?constraints.moonSep:S.session.moonSepDefault}°):`);
    const m=moonPos(ev.mid);
    for(const {t,tn} of ranked){
      const w=tn.windows.map(w=>`${fmtHM(w.from)}–${fmtHM(w.to)} (${fmtDur(w.minutes)}, peak ${w.peakAlt.toFixed(0)}°)`).join('; ')||'no usable window';
      L.push(`  ${t.id} ${t.n} [${TYPE_NAMES[t.type]||t.type}, ${t.size}', palette ${t.pal}]: ${w}. Transit ${tn.transit?fmtHM(tn.transit)+' (meridian flip)':'outside dark hours'}. Moon sep ~${angSep(t.ra,t.dec,m.ra,m.dec).toFixed(0)}°.`);
      const proj=S.projects.find(p=>p.targetId===t.id);
      if(proj){
        const st=projectStatus(proj);
        L.push(`    PROJECT "${proj.name}": `+st.map(r=>`${r.short} ${r.done}/${r.goal} subs @${r.exp}s (${r.pct}%)`).join(', '));
      }
    }
  }
  const wx=S.weatherCache&&S.weatherCache.data?parseWeather(S.weatherCache.data):null;
  if(wx&&wx.series.cloud&&ev.dusk18){
    const pts=[]; for(let h=0;h<=10;h++){ const d=new Date(ev.dusk18.getTime()+h*3600e3); if(ev.dawn18&&d>ev.dawn18)break; const c=cloudAt(d); pts.push(fmtHM(d)+':'+(c==null?'?':Math.round(c*100)+'%')); }
    L.push(`ASTROSPHERIC CLOUD COVER: ${pts.join(' ')}`);
  } else L.push('WEATHER: no forecast cached.');
  if(constraints&&constraints.notes) L.push('TONIGHT CONSTRAINTS: '+constraints.notes);
  return L.join('\n');
}

function walkNina(node, visit){

/* NINA JSON uses $id/$ref cross-references — build an index and resolve */
function ninaIndex(json){
  const idx={};
  (function walk(n){ if(!n||typeof n!=='object') return;
    if(n.$id) idx[n.$id]=n;
    for(const v of Object.values(n)) if(v&&typeof v==='object') walk(v);
  })(json);
  return idx;
}
function deref(obj, idx){ return (obj&&obj.$ref&&idx[obj.$ref])?idx[obj.$ref]:obj; }
/* Parse a NINA autosave/sequence json → [{target, blocks:[{filter,exp,completed,total}]}] */
function importNinaSession(json){
  const idx=ninaIndex(json);
  const results=[];
  let cur=null;
  walkNina(json, node=>{
    const t=node.$type||'';
    if(t.includes('DeepSkyObjectContainer')){
      cur={target:(node.Target&&node.Target.TargetName)||node.Name||'Unknown', blocks:[]};
      results.push(cur);
    }
    if(t.includes('SmartExposure') && cur){
      let filter=null, exp=null, completed=0, total=0;
      const exprVal=x=>{ if(x==null) return null; if(typeof x==='string') return x;
        if(typeof x==='object'){ const r=deref(x,idx); return r.Expression??r.Value??null; } return String(x); };
      const exprNum=x=>{ const v=exprVal(x); if(v==null) return null; const m=String(v).match(/[\d.]+/); return m?parseFloat(m[0]):null; };
      walkNina(node, n2=>{
        const t2=n2.$type||'';
        if(t2.includes('SwitchFilter')){
          if(n2.Filter){ const f=deref(n2.Filter,idx); filter=f._name||f.Name||filter; }
          if(!filter && n2.FilterExpr){ const v=exprVal(n2.FilterExpr); if(v) filter=v; }
        }
        if(t2.includes('TakeExposure') && n2.ImageType==='LIGHT'){
          if(n2.ExposureTime) exp=n2.ExposureTime;
          if(exp==null) exp=exprNum(n2.ExposureTimeExpr)??exprNum(n2.EExpr);
        }
        if(t2.includes('LoopCondition')){
          total=n2.Iterations??exprNum(n2.IterationsExpr)??exprNum(n2.IterExpr)??0;
          completed=n2.CompletedIterations||0;
        }
      });
      cur.blocks.push({filter, exp, completed, total});
    }
  });

}

function download(name, text, mime){

  document.body.appendChild(a); a.click(); a.remove();

/* ============ Local folder access (Chrome File System Access API) ============ */
const FOLDER_KINDS = {
  importSeq:{label:'NINA import folder (sequence/autosave JSON)', mode:'read'},
  exportSeq:{label:'NINA export folder (sequence JSON)', mode:'readwrite'},
  images:{label:'Captured images folder', mode:'read'},
  backup:{label:'Night Rider 3000 backups folder', mode:'readwrite'},
};
function fsSupported(){ return typeof window!=='undefined' && !!window.showDirectoryPicker; }
function idbOpen(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open('nightrider-fs',1);
    r.onupgradeneeded=()=>r.result.createObjectStore('handles');
    r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error);
  });
}
async function idbSet(key,val){ const db=await idbOpen(); return new Promise((res,rej)=>{ const tx=db.transaction('handles','readwrite'); tx.objectStore('handles').put(val,key); tx.oncomplete=()=>res(); tx.onerror=()=>rej(tx.error); }); }
async function idbGet(key){ const db=await idbOpen(); return new Promise((res,rej)=>{ const tx=db.transaction('handles','readonly'); const rq=tx.objectStore('handles').get(key); rq.onsuccess=()=>res(rq.result); rq.onerror=()=>rej(rq.error); }); }
async function pickFolder(kind){
  if(!fsSupported()){ toast('Folder access needs Chrome (File System Access API).', true); return null; }
  try{
    const handle = await window.showDirectoryPicker({id:kind});
    await idbSet('folder:'+kind, handle);
    S.folders[kind] = {name:handle.name, connected:true}; save();
    toast(FOLDER_KINDS[kind].label+' set: '+handle.name);
    return handle;
  }catch(e){ if(e.name!=='AbortError') toast('Folder pick failed: '+e.message, true); return null; }
}
/* Returns a usable handle, or null. If requestPerm, prompts (must be from a user gesture). */
async function getFolder(kind, requestPerm){
  if(!fsSupported()) return null;
  let handle; try{ handle = await idbGet('folder:'+kind); }catch(e){ return null; }
  if(!handle) return null;
  const mode=FOLDER_KINDS[kind].mode;
  try{
    let perm = await handle.queryPermission({mode});
    if(perm!=='granted' && requestPerm) perm = await handle.requestPermission({mode});
    S.folders[kind]={name:handle.name, connected:perm==='granted'}; save();
    return perm==='granted' ? handle : null;
  }catch(e){ S.folders[kind]={name:handle.name, connected:false}; save(); return null; }
}
async function walkDir(handle, path){
  path=path||''; const out=[];
  for await (const [name, entry] of handle.entries()){
    if(entry.kind==='file') out.push({name, path:path+name, handle:entry});
    else { const sub=await walkDir(entry, path+name+'/'); out.push(...sub); }
  }
  return out;
}
async function writeExportFile(name, content){
  const handle = await getFolder('exportSeq', true);

    try{
      const fh = await handle.getFileHandle(name, {create:true});
      const w = await fh.createWritable(); await w.write(content); await w.close();

    }catch(e){ toast('Folder write failed ('+e.message+') — downloading instead.', true); }
  }

}

/* ============ Filename / date parsing ============ */
const MONTHS3=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
/* Parses a trailing "(D Mon YYYY)" date out of a filename, tolerant of spacing/case */
function parseTrailingDate(name){
  const m=name.match(/\(\s*(\d{1,2})\s*([A-Za-z]{3,9})\s*(\d{4})\s*\)/i);
  if(!m) return null;
  const mon=MONTHS3.indexOf(m[2].slice(0,3).toLowerCase());
  if(mon<0) return null;
  return new Date(+m[3], mon, +m[1]);
}
/* Builds "Subject (D Mon YYYY HHmm).json" per the user's convention (date=session night, time=export time for uniqueness) */
function exportFilename(subject, dateStr, ext){
  const [y,m,d]=dateStr.split('-').map(Number);
  const dt=new Date(); const MON=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const hh=String(dt.getHours()).padStart(2,'0'), mi=String(dt.getMinutes()).padStart(2,'0');
  return `${subject} (${d} ${MON[m-1]} ${y} ${hh}${mi}).${ext||'json'}`;
}
/* Parses NINA's capture filename: Target_YYYY-MM-DD_Filter_Exps_BinWxH[_Camera]_Ttemp_Ggain_Ooffset_HFRvalue_frame.ext
   The camera segment is optional (only present if $$CAMERA$$ was added to the file pattern) — keeps old filenames matching too. */
function parseImageFilename(name){
  const m=name.match(/^(.+?)_(\d{4}-\d{2}-\d{2})_(.+)_([\d.]+)s_Bin(\d+)x(\d+)(?:_([^_]+))?_T(-?[\d.]+)_G(\d+)_O(\d+)_HFR([\d.]+)_(\d+)\.(xisf|fits?|fit)$/i);
  if(!m) return null;
  return {target:m[1], date:m[2], filter:m[3], exp:parseFloat(m[4]), binX:+m[5], binY:+m[6], camera:m[7]||null,
    temp:parseFloat(m[8]), gain:+m[9], offset:+m[10], hfr:parseFloat(m[11]), frame:m[12]};
}
async function scanImagesFolder(){
  const handle = await getFolder('images', true);
  if(!handle) return null;
  const files = await walkDir(handle);
  return files.map(f=>parseImageFilename(f.name)).filter(Boolean);
}
function avg(a){ return a && a.length ? a.reduce((x,y)=>x+y,0)/a.length : null; }
/* Groups parsed image rows by target, with per-filter and per-date sub-breakdowns and HFR stats */
function summarizeImages(parsed){
  const byTarget={};
  for(const r of parsed){
    const k=r.target;
    const t=byTarget[k]=byTarget[k]||{count:0, sec:0, hfrs:[], byFilter:{}, byDate:{}};
    t.count++; t.sec+=r.exp; if(r.hfr>0) t.hfrs.push(r.hfr);
    t.byFilter[r.filter]=t.byFilter[r.filter]||{count:0,sec:0,hfrs:[]};
    t.byFilter[r.filter].count++; t.byFilter[r.filter].sec+=r.exp; if(r.hfr>0) t.byFilter[r.filter].hfrs.push(r.hfr);
    t.byDate[r.date]=t.byDate[r.date]||{count:0,sec:0,hfrs:[]};
    t.byDate[r.date].count++; t.byDate[r.date].sec+=r.exp; if(r.hfr>0) t.byDate[r.date].hfrs.push(r.hfr);
  }
  return byTarget;
}

/* ============ NINA Advanced API ============ */
/* Strips any path a person might paste (NINA's own plugin page shows the full /v2/api URL) down to bare host:port */
function normalizeNinaUrl(url){
  return (url||'').trim().replace(/\/+$/,'').replace(/\/v2\/api.*$/i,'').replace(/\/api.*$/i,'');
}
/* Timeout without AbortSignal — avoids a structured-clone crash seen when this page is proxied
   through certain browser-extension contexts; a plain Promise.race works everywhere. */
function fetchWithTimeout(url, opts, ms){
  return Promise.race([
    fetch(url, opts||{}),
    new Promise((_,rej)=>setTimeout(()=>rej(new Error('Timed out after '+(ms||6000)+'ms')), ms||6000))
  ]);
}
function ninaBase(){ return normalizeNinaUrl(S.nina.url); }
async function ninaGet(path){
  const res=await fetchWithTimeout(ninaBase()+path, {}, 6000);
  if(!res.ok) throw new Error('HTTP '+res.status+' on '+path);
  return res.json();
}
async function ninaPost(path, body){
  const res=await fetchWithTimeout(ninaBase()+path, {method:'POST', headers:{'Content-Type':'application/json'}, body: body!=null?JSON.stringify(body):undefined}, 8000);
  if(!res.ok) throw new Error('HTTP '+res.status+' on '+path);
  const txt=await res.text();
  try{ return JSON.parse(txt); }catch(e){ return txt; }
}
/* Recursively scans an arbitrary NINA API response for keys matching each regex — same tolerant-parse
   approach as the Astrospheric weather parser, since the exact response shape hasn't been verified live yet. */
function deepFind(obj, patterns, out){
  out=out||{};
  if(!obj||typeof obj!=='object') return out;
  for(const [k,v] of Object.entries(obj)){
    for(const [name,re] of Object.entries(patterns)){
      if(!(name in out) && re.test(k) && (typeof v==='number'||typeof v==='string')){
        const n=typeof v==='number'?v:parseFloat(v);
        if(!isNaN(n)) out[name]=n;
        else if(typeof v==='string' && v.trim()) out[name]=v;
      }
    }
    if(v && typeof v==='object') deepFind(v, patterns, out);
  }
  return out;
}

async function fetchNinaFilterWheel(){

/* Tries to push a plan live into NINA's sequencer; on any failure, falls back to the existing

   requestPermission() needs a fresh user gesture, and an intervening network await can burn through
   that window, so asking after a failed push risks a silent non-prompt. */
async function ninaPushOrExport(seqJson, filename){

/* ============ Telescopius ============ */
/* Auth format confirmed by live testing: "Authorization: Key <key>" — NOT Bearer, and notably the
   official docs tool at api.telescopius.com generates the wrong header format itself. Base is
   versioned (v2.2), not the bare root. */
async function telescopiusGet(path){
  if(!S.keys.telescopius) throw new Error('Add your Telescopius API key in Settings.');
  const res=await fetchWithTimeout('https://api.telescopius.com/v2.2'+path, {headers:{'Authorization':'Key '+S.keys.telescopius,'Accept':'application/json'}}, 6000);
  const txt=await res.text();
  if(!res.ok) throw new Error('HTTP '+res.status+': '+txt.slice(0,200));
  try{ return JSON.parse(txt); }catch(e){ return txt; }
}
function telescopiusSearchUrl(t){ return 'https://telescopius.com/search?q='+encodeURIComponent(t.id||t.n); }
/* CSV import: tolerant of Telescopius list exports (looks for name/ra/dec columns) */
function importTelescopiusCsv(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2) throw new Error('CSV appears empty.');
  const split=l=>{ const out=[];let cur='',q=false; for(const ch of l){ if(ch==='"')q=!q; else if(ch===','&&!q){out.push(cur);cur='';} else cur+=ch;} out.push(cur); return out.map(s=>s.trim()); };
  const head=split(lines[0]).map(h=>h.toLowerCase());
  const col=re=>head.findIndex(h=>re.test(h));
  const iName=col(/name|catalogue entry|object/), iRa=col(/^ra|right asc/), iDec=col(/^dec|declination/), iType=col(/type/), iSize=col(/size|diameter|major/);
  if(iName<0||iRa<0||iDec<0) throw new Error('Could not find name/RA/Dec columns. Header was: '+head.join(', '));
  const parseRa=v=>{ v=v.trim(); if(/^[\d.]+$/.test(v)) {const f=parseFloat(v); return f>24? f/15 : f;} 
    const m=v.match(/(\d+)[h:\s]+(\d+)[m:'\s]*([\d.]*)/); if(m) return (+m[1])+(+m[2])/60+(+(m[3]||0))/3600; return NaN; };
  const parseDec=v=>{ v=v.trim(); if(/^[+-]?[\d.]+$/.test(v)) return parseFloat(v);
    const m=v.match(/([+-−]?)(\d+)[d°:\s]+(\d+)['′m:\s]*([\d.]*)/); if(m){const s=m[1]==='-'||m[1]==='−'?-1:1; return s*((+m[2])+(+m[3])/60+(+(m[4]||0))/3600);} return NaN; };
  let added=0;
  for(let i=1;i<lines.length;i++){
    const c=split(lines[i]); if(c.length<3) continue;
    const ra=parseRa(c[iRa]||''), dec=parseDec(c[iDec]||'');
    const name=c[iName]; if(!name||isNaN(ra)||isNaN(dec)) continue;
    const idb=name.replace(/\s+/g,'').slice(0,24); 
    if(getTarget(idb)) continue;
    S.customTargets.push({id:idb, n:name, ra, dec, type: 'CU', size: iSize>=0?parseFloat(c[iSize])||30:30, sb:22.0, pal:'—', custom:true, srcType: iType>=0?c[iType]:''});
    added++;
  }
  save();
  return added;
}

/* Persisted per-night plan (also used by Planner for future dates) */
function planFor(dateStr){
  if(!S.futurePlans[dateStr]){
    S.futurePlans[dateStr]={targets:[], moonSep:S.session.moonSepDefault, notes:'', autoFill:true};
    autoFillPlan(dateStr); save();
  }
  return S.futurePlans[dateStr];
}
function tonightPlan(){ return planFor(S.uiNight); }
function projectPaceDeficit(p){
  const st=projectStatus(p);
  const goal=st.reduce((a,r)=>a+r.goal,0), done=st.reduce((a,r)=>a+r.done,0);
  return goal ? 1-(done/goal) : 0;
}
/* Auto-fill an empty plan from active projects with usable windows that night, ranked by how far behind pace they are */
function autoFillPlan(dateStr){
  const plan=S.futurePlans[dateStr]; if(!plan || !plan.autoFill || plan.targets.length) return;
  const ev=nightEvents(dateStr);
  const cands=S.projects.map(p=>{
    const t=getTarget(p.targetId); if(!t) return null;
    const tn=targetNight(t,ev,{moonSep:plan.moonSep});
    const usable=tn.windows.reduce((a,w)=>a+w.minutes,0);
    const minNeeded=p.minSessionMin||30;
    return usable>=minNeeded ? {t,usable,deficit:projectPaceDeficit(p)*(p.priority||1)} : null;
  }).filter(Boolean).sort((a,b)=>b.deficit-a.deficit || b.usable-a.usable);
  const cap=S.toggles.multiTarget?2:1;
  plan.targets=cands.slice(0,cap).map(c=>c.t.id);
}
/* Pace-based completion estimate: avg subs/session logged, projected against upcoming usable nights */
function forecastProject(p){
  const st=projectStatus(p);
  const remaining=st.reduce((a,r)=>a+Math.max(0,r.goal-r.done),0);
  const totalDone=st.reduce((a,r)=>a+r.done,0);
  const sessionDates=[...new Set(p.logs.map(l=>l.date))];
  const avgPerSession=sessionDates.length? totalDone/sessionDates.length : 0;
  const out={remaining, sessionsLogged:sessionDates.length, avgPerSession, sessionsNeeded:null, etaDate:null};
  if(remaining<=0){ out.sessionsNeeded=0; return out; }
  if(avgPerSession<=0) return out;
  out.sessionsNeeded=Math.ceil(remaining/avgPerSession);
  const t=getTarget(p.targetId); if(!t) return out;
  const start=new Date(); start.setHours(12,0,0,0);
  let found=0;
  for(let i=0;i<60 && found<out.sessionsNeeded;i++){
    const ds=new Date(start.getTime()+i*86400e3).toISOString().slice(0,10);
    const ev=nightEvents(ds);
    const tn=targetNight(t,ev,{moonSep:S.session.moonSepDefault});
    const usable=tn.windows.reduce((a,w)=>a+w.minutes,0);
    if(usable>=(p.minSessionMin||30)){ found++; if(found===out.sessionsNeeded) out.etaDate=ds; }
  }
  return out;
}

function sortedByBest(ev){
  return allTargets().map(t=>{
    const tn=targetNight(t,ev,{moonSep:tonightPlan().moonSep});
    const tot=tn.windows.reduce((a,w)=>a+w.minutes,0);
    return {...t, _min:tot, best: tot>0? fmtDur(tot):'—'};
  }).sort((a,b)=>b._min-a._min);
}
function drawTimeline(ev,tp,dateStr,containerId){
  dateStr=dateStr||S.uiNight;
  const wrap=$('#'+(containerId||'tl-wrap')); if(!ev.sunset||!ev.sunrise){ wrap.innerHTML='<div class="dim">Could not compute night events.</div>'; return; }
  const t0=new Date(ev.sunset.getTime()-45*60e3), t1=new Date(ev.sunrise.getTime()+45*60e3);
  const W=1160, PADL=64, PADR=12, rowH=26, headH=54;
  const rows=tp.targets.map(id=>getTarget(id)).filter(Boolean);
  const H=headH+Math.max(1,rows.length)*rowH+46;
  const X=d=>PADL+(d-t0)/(t1-t0)*(W-PADL-PADR);
  let s=`<svg id="tl-svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">`;
  // weather shading behind everything
  const p=S.weatherCache&&S.weatherCache.data?parseWeather(S.weatherCache.data):null;
  if(p&&p.series.cloud&&p.start){
    for(let t=t0.getTime(); t<t1.getTime(); t+=1800e3){
      const c=cloudAt(new Date(t)); if(c==null) continue;
      s+=`<rect x="${X(new Date(t))}" y="${headH-6}" width="${X(new Date(t+1800e3))-X(new Date(t))}" height="${H-headH-34}" fill="rgba(224,90,78,${(c*0.32).toFixed(3)})"/>`;
    }
  }
  // twilight bands
  const band=(a,b,color)=>{ if(a&&b) s+=`<rect x="${X(a)}" y="${headH-14}" width="${Math.max(0,X(b)-X(a))}" height="8" fill="${color}" rx="2"/>`; };
  band(t0,ev.sunset,'#3A4A66'); band(ev.sunset,ev.dusk18,'#232F47'); band(ev.dusk18,ev.dawn18,'#101726'); band(ev.dawn18,ev.sunrise,'#232F47'); band(ev.sunrise,t1,'#3A4A66');
  s+=`<rect x="${X(ev.dusk18)}" y="${headH-14}" width="${X(ev.dawn18)-X(ev.dusk18)}" height="8" fill="none" stroke="var(--amber)" stroke-width="1" rx="2"/>`;
  // hour ticks
  const tick=new Date(t0); tick.setMinutes(0,0,0); tick.setHours(tick.getHours()+1);
  for(let t=tick.getTime(); t<t1.getTime(); t+=3600e3){
    const x=X(new Date(t));
    s+=`<line x1="${x}" y1="${headH-16}" x2="${x}" y2="${H-30}" stroke="var(--line)" stroke-width="1"/>`;
    s+=`<text x="${x}" y="${H-16}" fill="var(--dim)" font-size="10" font-family="var(--mono)" text-anchor="middle">${new Date(t).getHours()}:00</text>`;
  }
  // moon bar
  {
    let mx0=null;
    for(let t=t0.getTime(); t<=t1.getTime(); t+=10*60e3){
      const up=moonPos(new Date(t)).alt>0;
      if(up&&mx0==null) mx0=t;
      if((!up||t+10*60e3>t1.getTime())&&mx0!=null){ s+=`<rect x="${X(new Date(mx0))}" y="${headH-28}" width="${X(new Date(t))-X(new Date(mx0))}" height="8" fill="rgba(216,222,233,.35)" rx="3"/>`; mx0=null; }
    }
    s+=`<text x="${PADL-8}" y="${headH-21}" fill="var(--dim)" font-size="10" text-anchor="end" font-family="var(--mono)">moon</text>`;
    s+=`<text x="${PADL-8}" y="${headH-7}" fill="var(--dim)" font-size="10" text-anchor="end" font-family="var(--mono)">sky</text>`;
  }
  // target rows
  rows.forEach((t,i)=>{
    const y=headH+i*rowH+4;
    const tn=targetNight(t,ev,{moonSep:tp.moonSep});
    s+=`<text x="${PADL-8}" y="${y+12}" fill="var(--text)" font-size="11.5" text-anchor="end" font-family="var(--mono)">${esc(t.id)}</text>`;
    // faint full altitude track where above floor but moon-blocked
    for(const smp of tn.samples){ if(smp.okAlt&&!smp.okMoon){ const x=X(smp.t); s+=`<rect x="${x}" y="${y+6}" width="2" height="6" fill="rgba(224,160,48,.35)"/>`; } }
    for(const w of tn.windows){
      s+=`<rect class="tlwin" data-tip="${esc(t.id)} ${fmtHM(w.from)}–${fmtHM(w.to)} · ${fmtDur(w.minutes)} · peak ${w.peakAlt.toFixed(0)}°" x="${X(w.from)}" y="${y+2}" width="${Math.max(2,X(w.to)-X(w.from))}" height="14" rx="4" fill="rgba(79,191,122,.30)" stroke="var(--good)" stroke-width="1"/>`;
    }
    if(S.toggles.flipMarkers&&tn.transit){
      const x=X(tn.transit);
      s+=`<path d="M ${x} ${y-1} l 4 7 l -8 0 z" fill="var(--amber)"><title>Meridian flip ~${fmtHM(tn.transit)}</title></path>`;
    }
    s+=`<text x="${W-6}" y="${y+12}" fill="var(--dim)" font-size="10" text-anchor="end" font-family="var(--mono)" style="cursor:pointer" onclick="removeFromPlan('${dateStr}','${esc(t.id)}');${containerId?'renderPlannerDay(\''+dateStr+'\')':'renderTonight()'}">✕</text>`;
  });
  if(!rows.length) s+=`<text x="${W/2}" y="${headH+18}" fill="var(--faint)" font-size="12" text-anchor="middle">Add targets above to see visibility windows</text>`;
  s+='</svg>';
  wrap.innerHTML=s;
  const tip=$('#tltip');
  wrap.querySelectorAll('.tlwin').forEach(r=>{
    r.addEventListener('mousemove',e=>{ tip.style.display='block'; tip.textContent=r.dataset.tip; tip.style.left=(e.clientX+14)+'px'; tip.style.top=(e.clientY+10)+'px'; });
    r.addEventListener('mouseleave',()=>tip.style.display='none');
  });
}
function removeFromPlan(dateStr,id){ const tp=planFor(dateStr); tp.targets=tp.targets.filter(x=>x!==id); tp.autoFill=false; save(); }
async function syncNinaLive(pid){
  const p=S.projects.find(x=>x.id===pid); if(!p) return;
  ensureSyncFields(p);
  const t=getTarget(p.targetId); const prof=S.profiles.find(x=>x.id===p.profileId)||profile();
  toast('Syncing from NINA…');
  try{
    const history=await fetchNinaImageHistory();
    let n=0;
    for(const img of history){
      if(p.syncedImageKeys[img.key]) continue; // already counted — the whole point of the key set
      const f=prof.filters.find(x=>x.short===img.filter || x.name===img.filter);
      if(!f || !p.goals[f.id]) continue; // not a filter this project tracks
      if(t && img.target && img.target!==t.n && img.target!==t.id) continue; // best-effort target match
      p.logs.push({date:S.uiNight, filterId:f.id, count:1, exp:p.goals[f.id].exp, source:'nina-live', key:img.key});
      p.syncedImageKeys[img.key]=true;
      n++;
    }
    save(); renderProjects();
    toast(n?n+' new subs synced from NINA.':'No new subs found (already up to date, or filter/target names didn\u2019t match — check the console/raw response if this looks wrong).');
  }catch(e){ toast('NINA sync failed: '+e.message,true); }
}
async function refreshNinaDash(){
  const box=$('#nina-dash'); if(!box) return;
  box.innerHTML='<span class="spin"></span> fetching…';
  try{
    const st=await fetchNinaSequenceStatus();
    let h='<div class="klist">';
    if(st.target) h+=`<span>Target <b>${esc(st.target)}</b></span>`;
    if(st.isRunning!=null) h+=`<span>Running <b class="${st.isRunning?'good':'dim'}">${st.isRunning?'yes':'no'}</b></span>`;
    h+='</div>';
    h+='<details style="margin-top:6px"><summary class="dim" style="cursor:pointer;font-size:11px">raw response (field names unverified — tell me what this looks like and I\u2019ll tighten the parser)</summary><pre class="mono" style="font-size:10px;white-space:pre-wrap;max-height:200px;overflow-y:auto">'+esc(JSON.stringify(st.raw,null,1)).slice(0,4000)+'</pre></details>';
    h+='<button class="btn small" id="nina-dash-btn" style="margin-top:8px">Refresh</button>';
    box.innerHTML=h;
    $('#nina-dash-btn').onclick=refreshNinaDash;
  }catch(e){
    box.innerHTML='<span class="bad">✗ '+esc(e.message)+'</span> <button class="btn small" id="nina-dash-btn" style="margin-left:8px">Retry</button>';
    $('#nina-dash-btn').onclick=refreshNinaDash;
  }
}

function drawPlanCards(ev,tp,dateStr,containerId){
  dateStr=dateStr||S.uiNight;
  const box=$('#'+(containerId||'tl-plans')); const prof=profile();
  if(!tp.targets.length){ box.innerHTML=''; return; }
  let h='<hr class="sep"><div class="grid2">';
  for(const id of tp.targets){
    const t=getTarget(id); if(!t) continue;
    const tn=targetNight(t,ev,{moonSep:tp.moonSep});
    const m=moonPos(ev.mid); const sep=angSep(t.ra,t.dec,m.ra,m.dec);
    const proj=S.projects.find(p=>p.targetId===id&&p.profileId===prof.id)||S.projects.find(p=>p.targetId===id);
    const fc=applyFlipCost(tn.windows, tn.transit, S.session.flipCostMin);
    h+=`<div class="card tight" style="margin:0">
      <div class="row" style="justify-content:space-between">
      <b style="${S.toggles.targetThumbs?'cursor:pointer':''}" ${S.toggles.targetThumbs?`onclick="framingModal('${esc(t.id)}')"`:''}>${S.toggles.targetThumbs?`<img src="${targetImageUrl(t)}" width="22" height="22" style="border-radius:4px;vertical-align:-5px;margin-right:6px;object-fit:cover" onerror="this.style.display='none'">`:''}${esc(t.id)} — ${esc(t.n)}</b>
      ${S.toggles.telescopiusLinks?`<a class="dim" style="font-size:11px" href="${telescopiusSearchUrl(t)}" target="_blank">Telescopius ↗</a>`:''}</div>
      <div class="klist" style="margin:6px 0">
        <span>${TYPE_NAMES[t.type]||t.type} <b>${t.size}′</b></span><span>Palette <b>${esc(t.pal)}</b></span>
        <span>Moon sep <b class="${sep>=tp.moonSep?'good':'warn'}">${sep.toFixed(0)}°</b></span>
        <span>Windows <b>${tn.windows.map(w=>fmtHM(w.from)+'–'+fmtHM(w.to)).join(', ')||'none'}</b></span>
        ${tn.transit&&fc.lostMin>0?`<span class="warn" title="Meridian flip ~${fmtHM(tn.transit)}, ${S.session.flipCostMin}min budgeted for flip+resettle">Usable <b>${fmtDur(fc.windows.reduce((a,w)=>a+w.minutes,0))}</b> after flip cost</span>`:''}
        ${S.session.nauticalBroadband?`<span class="dim" title="Broadband filters may start/end during nautical twilight per Settings">Broadband window can extend into nautical twilight</span>`:''}
      </div>
      <table><thead><tr><th>Filter</th><th>Sub (ideal→snap)</th><th>Penalty</th><th>Subs/hr</th></tr></thead><tbody>`;
    for(const f of prof.filters){
      const sqm=skySQM(ev.moonIllum, m.alt, sep);
      const o=optimalSub(prof,f,sqm); const sn=snapToDarks(o.t,prof.darks);
      const pen=noisePenalty(prof,f,sqm,sn.snap);
      const gapWarn=S.toggles.gapWarnings&&(sn.ratio>1.8||sn.ratio<0.55);
      h+=`<tr><td><span class="chip"><span class="dot" style="background:${f.color}"></span>${esc(f.short)}</span></td>
        <td>${o.t<9999?o.t.toFixed(0):'>9999'}s → <b class="amber">${sn.snap}s</b>${gapWarn?` <span class="badge wn" title="Nearest dark is ${sn.ratio>1?((sn.ratio-1)*100).toFixed(0)+'% longer':((1-sn.ratio)*100).toFixed(0)+'% shorter'} than ideal — consider shooting a new master dark near ${Math.round(o.t)}s">gap</span>`:''}</td>
        <td class="${pen<8?'good':pen<20?'warn':'bad'}">${pen.toFixed(1)}%</td>
        <td class="dim">${Math.floor(3600/sn.snap)}</td></tr>`;
    }
    h+=`</tbody></table>`;
    if(proj){
      h+='<div style="margin-top:8px">';
      for(const r of projectStatus(proj)){
        h+=`<div class="row" style="gap:8px;margin:3px 0"><span class="mono dim" style="width:78px">${esc(r.short)}</span>
          <div class="pbar" style="flex:1"><div style="width:${Math.min(100,r.pct)}%;background:${r.color}"></div></div>
          <span class="mono dim" style="font-size:11px">${r.done}/${r.goal}</span></div>`;
      }
      h+='</div>';
    }
    h+='</div>';
  }
  h+='</div>';
  // B-side suggestion
  if(S.toggles.bside&&tp.targets.length===1){
    const t=getTarget(tp.targets[0]); const tn=targetNight(t,ev,{moonSep:tp.moonSep});
    const lastEnd=tn.windows.length?tn.windows[tn.windows.length-1].to:null;
    if(lastEnd&&ev.dawn18&&(ev.dawn18-lastEnd)>60*60e3){
      const gapMin=(ev.dawn18-lastEnd)/60e3;
      const cands=allTargets().filter(x=>x.id!==t.id).map(x=>{
        const xn=targetNight(x,ev,{moonSep:tp.moonSep});
        const usable=xn.windows.reduce((a,w)=>a+Math.max(0,Math.min(w.to,ev.dawn18)-Math.max(w.from,lastEnd))/60e3,0);
        return {x,usable};
      }).filter(c=>c.usable>45).sort((a,b)=>b.usable-a.usable).slice(0,4);
      if(cands.length){
        h+=`<div class="card tight" style="margin-top:12px"><b class="amber">B-side:</b> <span class="dim">${esc(t.id)} is done by ${fmtHM(lastEnd)}, leaving ${fmtDur(gapMin)} of dark.</span> `;
        h+=cands.map(c=>`<button class="btn small" onclick="addToPlan('${dateStr}','${esc(c.x.id)}');${containerId?'renderPlannerDay(\''+dateStr+'\')':'renderTonight()'}">${esc(c.x.id)} (${fmtDur(c.usable)})</button>`).join(' ');
        h+='</div>';
      }
    }
  }
  box.innerHTML=h;
}

function drawMoonCal(){

async function bestNights(){
  const box=$('#bestnights'); box.innerHTML='<span class="spin"></span> scanning…';
  await new Promise(r=>setTimeout(r,30));
  const tp=tonightPlan(); const ids=tp.targets.length?tp.targets:S.projects.map(p=>p.targetId);
  if(!ids.length){ box.innerHTML='<span class="dim">Add tonight targets or create a project first — the scan scores nights for specific targets.</span>'; return; }
  const start=new Date(); start.setHours(12,0,0,0);
  const rows=[];
  for(let i=0;i<21;i++){
    const ds=new Date(start.getTime()+i*86400e3).toISOString().slice(0,10);
    const ev=nightEvents(ds);
    let best={score:-1};
    for(const id of ids){
      const t=getTarget(id); if(!t) continue;
      const tn=targetNight(t,ev,{moonSep:tp.moonSep});
      const min=tn.windows.reduce((a,w)=>a+w.minutes,0);
      const score=min*(1-ev.moonIllum*0.6);
      if(score>best.score) best={score,id,min};
    }
    rows.push({ds,ev,...best});
  }
  rows.sort((a,b)=>b.score-a.score);
  let h='<table><thead><tr><th>Night</th><th>Moon</th><th>Best target</th><th>Usable window</th><th></th></tr></thead><tbody>';
  for(const r of rows.slice(0,8)){
    h+=`<tr><td>${r.ds}</td><td>${moonEmoji(r.ev.moonPhaseAngle)} ${(r.ev.moonIllum*100).toFixed(0)}%</td><td>${esc(r.id||'—')}</td><td>${fmtDur(r.min)}</td>
    <td><button class="btn small" onclick="$('#nightdate').value='${r.ds}';S.uiNight='${r.ds}';save();renderAll()">open</button></td></tr>`;
  }
  box.innerHTML=h+'</tbody></table><div class="fieldnote">Scored by usable minutes × moon darkness for your tonight/project targets. Re-run after adding targets.</div>';
}

/* Night sheet export */
function nightSheet(ev,tp){
  const prof=profile(); const m=moonPos(ev.mid);
  let md=`# Night Rider 3000 — ${S.uiNight}\n${prof.name}\n\nAstro dark: ${fmtHM(ev.dusk18)}–${fmtHM(ev.dawn18)} · Moon ${(ev.moonIllum*100).toFixed(0)}% (rise ${fmtHM(ev.moonrise)}, set ${fmtHM(ev.moonset)})\n\n`;
  const usedFilters=new Set();
  for(const id of tp.targets){
    const t=getTarget(id); const tn=targetNight(t,ev,{moonSep:tp.moonSep});
    const sep=angSep(t.ra,t.dec,m.ra,m.dec);
    md+=`## ${t.id} — ${t.n}\nWindows: ${tn.windows.map(w=>fmtHM(w.from)+'–'+fmtHM(w.to)+' ('+fmtDur(w.minutes)+')').join(', ')||'none'}${tn.transit?` · Flip ~${fmtHM(tn.transit)}`:''} · Moon sep ${sep.toFixed(0)}°\n\n| Filter | Sub | Penalty | Subs/hr |\n|---|---|---|---|\n`;
    for(const f of prof.filters){
      const sqm=skySQM(ev.moonIllum,m.alt,sep); const o=optimalSub(prof,f,sqm); const sn=snapToDarks(o.t,prof.darks);
      md+=`| ${f.short} | ${sn.snap}s | ${noisePenalty(prof,f,sqm,sn.snap).toFixed(1)}% | ${Math.floor(3600/sn.snap)} |\n`;
      usedFilters.add(f.id);
    }
    md+='\n';
  }
  md+=`## Flats\n| Filter | Panel brightness | Exposure | Count |\n|---|---|---|---|\n`;
  for(const f of prof.filters) if(usedFilters.has(f.id)) md+=`| ${f.short} | ${f.flatBright??'—'}% | ${f.flatExp?f.flatExp+'s':'auto'} | ${f.flatCount} |\n`;
  download(`NightRider_nightsheet_${S.uiNight}.md`, md, 'text/markdown');
}
/* NINA export dialog */
function ninaExportDialog(tp){
  if(!tp.targets.length){ toast('Add at least one target to tonight first.',true); return; }
  const prof=profile(); const ev=nightEvents(S.uiNight); const m=moonPos(ev.mid);
  const t=getTarget(tp.targets[0]);
  const proj=S.projects.find(p=>p.targetId===t.id);
  let h=`<h3>Export NINA sequence — ${esc(t.id)}</h3><div class="sub">Loads as a DSO container template. Review loop counts before running.</div><table><thead><tr><th></th><th>Filter</th><th>Exp (s)</th><th>Count</th></tr></thead><tbody>`;
  prof.filters.forEach((f,i)=>{
    const sep=angSep(t.ra,t.dec,m.ra,m.dec);
    const sn=snapToDarks(optimalSub(prof,f,skySQM(ev.moonIllum,m.alt,sep)).t,prof.darks);
    let remaining=20;
    if(proj&&proj.goals[f.id]){ const st=projectStatus(proj).find(r=>r.fid===f.id); if(st) remaining=Math.max(0,st.goal-st.done); }
    h+=`<tr><td><input type="checkbox" id="nx-on-${i}" ${f.kind!=='broadband'||sep>60?'checked':''}></td><td class="sans">${esc(f.short)}</td>
    <td><input type="number" id="nx-exp-${i}" class="short" value="${sn.snap}"></td>
    <td><input type="number" id="nx-cnt-${i}" class="short" value="${remaining}"></td></tr>`;
  });
  h+=`</tbody></table><label class="f">Rotation (°)</label><input type="number" id="nx-rot" class="short" value="${proj?.rotation??0}">
  <div class="row" style="margin-top:12px;justify-content:flex-end"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" id="nx-go">Export</button></div>`;
  modal(h);
  $('#nx-go').onclick=async()=>{
    const blocks=[]; const filtersState={};
    prof.filters.forEach((f,i)=>{
      const on=$('#nx-on-'+i).checked;
      filtersState[f.id]={on, exp:+$('#nx-exp-'+i).value, count:+$('#nx-cnt-'+i).value};
      if(on) blocks.push({filterName:f.name, pos:f.pos, exp:+$('#nx-exp-'+i).value, count:+$('#nx-cnt-'+i).value});
    });
    if(!blocks.length){ toast('No filters selected.',true); return; }
    const rotation=+$('#nx-rot').value||0;
    S.lastExport[prof.id]={filters:filtersState, rotation}; save();
    const seq=exportNinaSequence({targetId:t.id, rotation, blocks});
    const name=exportFilename(t.id+' '+t.n, S.uiNight);
    closeModal();
    if(S.toggles.ninaPush && S.nina.url){
      const r=await ninaPushOrExport(seq, name);
      toast(r.pushed?'Pushed live into NINA\u2019s sequencer.':'Live push failed ('+r.fallbackReason+') — exported a file instead.', !r.pushed);
    } else {
      await writeExportFile(name, JSON.stringify(seq,null,1));
    }
  };
}
/* One-click export using last-used filter/exposure/count choices (or sensible defaults) for the first tonight target */
async function quickExportNina(tp){
  if(!tp.targets.length){ toast('Add at least one target to tonight first.',true); return; }
  const prof=profile(); const ev=nightEvents(S.uiNight); const m=moonPos(ev.mid);
  const t=getTarget(tp.targets[0]); if(!t) return;
  const proj=S.projects.find(p=>p.targetId===t.id);
  const last=S.lastExport[prof.id];
  const blocks=[];
  prof.filters.forEach(f=>{
    const sep=angSep(t.ra,t.dec,m.ra,m.dec);
    const sn=snapToDarks(optimalSub(prof,f,skySQM(ev.moonIllum,m.alt,sep)).t,prof.darks);
    const lf=last&&last.filters&&last.filters[f.id];
    const on=lf?lf.on:(f.kind!=='broadband'||sep>60);
    if(!on) return;
    let remaining=20;
    if(proj&&proj.goals[f.id]){ const st=projectStatus(proj).find(r=>r.fid===f.id); if(st) remaining=Math.max(0,st.goal-st.done); }
    blocks.push({filterName:f.name, pos:f.pos, exp:lf?lf.exp:sn.snap, count:lf?lf.count:remaining});
  });
  if(!blocks.length){ toast('No filters would be included — try Review export instead.',true); return; }
  const rotation=proj?.rotation ?? (last?.rotation||0);
  const seq=exportNinaSequence({targetId:t.id, rotation, blocks});
  const name=exportFilename(t.id+' '+t.n, S.uiNight);
  if(S.toggles.ninaPush && S.nina.url){
    const r=await ninaPushOrExport(seq, name);
    toast(r.pushed?'Pushed live into NINA\u2019s sequencer.':'Live push failed ('+r.fallbackReason+') — exported a file instead.', !r.pushed);
  } else {
    await writeExportFile(name, JSON.stringify(seq,null,1));
  }
}

function ensureSyncFields(p){
  if(!p.ninaSyncHighWater) p.ninaSyncHighWater={};
  if(!p.syncedImageKeys) p.syncedImageKeys={};
  return p;
}
function projectStatus(p){
  const prof=S.profiles.find(x=>x.id===p.profileId)||profile();
  return Object.entries(p.goals).map(([fid,g])=>{
    const f=prof.filters.find(x=>x.id===fid)||{short:fid,color:'var(--dim)'};
    const done=p.logs.filter(l=>l.filterId===fid).reduce((a,l)=>a+l.count,0);
    return {fid, short:f.short, color:f.color, goal:g.count, exp:g.exp, done, pct:g.count?Math.round(done/g.count*100):0};
  });
}

async function ninaImportFlow(file){
  try{
    const json=JSON.parse(await file.text());
    const res=importNinaSession(json);
    if(!res.length){ toast('No SmartExposure blocks with progress found in that file.',true); return; }
    let h=`<h3>NINA import — review before applying</h3><div class="sub">Completed iterations found per filter block. Pick the project and which counts to apply.</div>
    <label class="f">Apply to project</label><select id="ni-proj">${S.projects.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('')}${!S.projects.length?'<option value="">— no projects, create one first —</option>':''}</select>
    <table><thead><tr><th></th><th>Target (file)</th><th>Filter (file)</th><th>Completed</th><th>Map to filter</th></tr></thead><tbody>`;
    const prof=profile(); let ri=0; const rows=[];
    for(const r of res) for(const b of r.blocks){
      const guess=prof.filters.find(f=>b.filter&&(b.filter.toLowerCase().includes(f.short.toLowerCase())||f.name.toLowerCase().includes((b.filter||'').toLowerCase())));
      rows.push({b, target:r.target});
      h+=`<tr><td><input type="checkbox" id="ni-on-${ri}" ${b.completed>0?'checked':''}></td><td class="sans dim">${esc(r.target)}</td>
      <td class="sans">${esc(b.filter||'?')}</td><td>${b.completed}${b.total?'/'+b.total:''}${b.exp?' @'+b.exp+'s':''}</td>
      <td><select id="ni-map-${ri}">${prof.filters.map(f=>`<option value="${f.id}" ${guess&&guess.id===f.id?'selected':''}>${esc(f.short)}</option>`).join('')}</select></td></tr>`;
      ri++;
    }
    h+=`</tbody></table><label class="f">Session date</label><input type="date" id="ni-date" value="${S.uiNight}">
    <div class="card tight" style="margin-top:10px"><div class="row" style="justify-content:space-between"><b>AI review</b><button class="btn small" id="ni-ai-btn">Review with AI</button></div>
    <div class="ai-out" id="ni-ai-out" style="margin-top:6px;max-height:200px"><span class="faint">Optional — checks for anomalies against project goals.</span></div></div>
    <div class="row" style="margin-top:12px;justify-content:flex-end"><button class="btn" onclick="closeModal()">Cancel</button><button class="btn primary" id="ni-go">Apply</button></div>`;
    modal(h);
    $('#ni-ai-btn').onclick=()=>reviewImportWithAI(rows, $('#ni-proj').value);
    if(S.toggles.aiReviewOnImport) reviewImportWithAI(rows, $('#ni-proj').value);
    $('#ni-go').onclick=()=>{
      const p=S.projects.find(x=>x.id===$('#ni-proj').value);
      if(!p){ toast('Create a project first.',true); return; }
      ensureSyncFields(p);
      let n=0, skipped=0;
      rows.forEach((r,i)=>{
        if(!$('#ni-on-'+i).checked||!r.b.completed) return;
        const fid=$('#ni-map-'+i).value;
        const prevHigh=p.ninaSyncHighWater[fid]||0;
        const delta=r.b.completed-prevHigh;
        if(delta<=0){ skipped++; return; } // already accounted for by an earlier import
        p.logs.push({date:$('#ni-date').value, filterId:fid, count:delta, exp:r.b.exp||p.goals[fid]?.exp||300, source:'nina-import', key:'import:'+Date.now()+':'+fid});
        p.ninaSyncHighWater[fid]=r.b.completed;
        n+=delta;
      });
      save(); closeModal(); renderProjects();
      toast(n+' subs imported from NINA.'+(skipped?' ('+skipped+' block(s) already accounted for — no double-count.)':''));
    };
  }catch(e){ toast('Import failed: '+e.message,true); }
}

function drawSnrChart(prof,sqm,t){
  const W=1120,H=300,PL=48,PB=28,PT=12,PR=140;
  const maxH=16;
  let maxS=0; const curves=[];
  for(const f of prof.filters){
    const sn=snapToDarks(optimalSub(prof,f,sqm).t,prof.darks);
    const pts=[];
    for(let hr=0.25; hr<=maxH; hr+=0.25){ const s=stackSNR(prof,f,sqm,t.sb,sn.snap,hr); pts.push([hr,s]); maxS=Math.max(maxS,s); }
    curves.push({f,pts,snap:sn.snap});
  }
  const X=h=>PL+h/maxH*(W-PL-PR), Y=s=>H-PB-(s/maxS)*(H-PB-PT);
  let svg=`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">`;
  for(let g=0;g<=4;g++){ const y=PT+g*(H-PB-PT)/4;
    svg+=`<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="var(--line)"/><text x="${PL-6}" y="${y+4}" fill="var(--dim)" font-size="10" text-anchor="end" font-family="var(--mono)">${(maxS*(1-g/4)).toFixed(0)}</text>`; }
  for(let hr=2;hr<=maxH;hr+=2) svg+=`<text x="${X(hr)}" y="${H-10}" fill="var(--dim)" font-size="10" text-anchor="middle" font-family="var(--mono)">${hr}h</text>`;
  curves.forEach((c,i)=>{
    const col=getComputedStyle(document.documentElement).getPropertyValue(c.f.color.match(/--[\w-]+/)?.[0]||'--dim').trim()||'#888';
    svg+=`<path d="M ${c.pts.map(p=>X(p[0]).toFixed(1)+' '+Y(p[1]).toFixed(1)).join(' L ')}" fill="none" stroke="${col}" stroke-width="1.8"/>`;
    // knee: where marginal SNR/hr falls under 25% of initial rate
    const r0=c.pts[3][1]-c.pts[0][1];
    let knee=null;
    for(let i=4;i<c.pts.length-3;i++){ if((c.pts[i+3][1]-c.pts[i][1])<r0*0.25){ knee=c.pts[i]; break; } }
    if(knee) svg+=`<path d="M ${X(knee[0])} ${Y(knee[1])-5} l 4 5 l -4 5 l -4 -5 z" fill="${col}"/>`;
    svg+=`<text x="${W-PR+8}" y="${PT+14+i*16}" fill="${col}" font-size="11" font-family="var(--mono)">${esc(c.f.short)} @${c.snap}s</text>`;
  });
  $('#lab-snr').innerHTML=svg+'</svg>';
}

/* minimal markdown → html (tables, bold, headers) for AI output */
function mdToHtml(md){
  const lines=md.split('\n'); let h='', inT=false;
  const inline=s=>esc(s).replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/`(.+?)`/g,'<code>$1</code>');
  for(let i=0;i<lines.length;i++){
    const l=lines[i];
    if(/^\s*\|/.test(l)){
      const cells=l.trim().replace(/^\||\|$/g,'').split('|').map(c=>c.trim());
      if(cells.every(c=>/^:?-{2,}:?$/.test(c))) continue;
      if(!inT){ h+='<table><tbody>'; inT=true; h+='<tr>'+cells.map(c=>'<th>'+inline(c)+'</th>').join('')+'</tr>'; }
      else h+='<tr>'+cells.map(c=>'<td>'+inline(c)+'</td>').join('')+'</tr>';
      if(!/^\s*\|/.test(lines[i+1]||'')){ h+='</tbody></table>'; inT=false; }
    }
    else if(/^#{1,3}\s/.test(l)) h+='<div style="font-weight:600;color:var(--amber);margin:8px 0 3px">'+inline(l.replace(/^#+\s*/,''))+'</div>';
    else h+=inline(l)+'\n';
  }
  return h;
}
