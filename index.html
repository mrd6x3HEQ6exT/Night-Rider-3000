    <div class="row"><input type="password" id="st-anth" value="${esc(S.keys.anthropic)}" placeholder="sk-ant-…" style="flex:1"><button class="btn small" id="st-anthtest">Test</button></div>
    <div class="fieldnote" id="st-anthstatus">Stored only in this browser's localStorage. Auto-selects Haiku for routine nights, Sonnet for complex ones — typically under a cent, rarely more than a few cents.</div>
    <label class="f">Astrospheric API key</label>
    <div class="row"><input type="password" id="st-astro" value="${esc(S.keys.astrospheric)}" placeholder="paste key" style="flex:1"><button class="btn small" id="st-astrotest">Test</button></div>
    <div class="fieldnote" id="st-astrostatus">100 credits/day; each forecast fetch costs 5 — <b>the test button below uses a real fetch, so it spends 5 too.</b> The app caches for 3h. Reset your key on astrospheric.com if it was ever shared in plain text.</div>
    <label class="f">Telescopius API key (patron)</label>
    <div class="row"><input type="password" id="st-tel" value="${esc(S.keys.telescopius)}" placeholder="optional" style="flex:1"><button class="btn small" id="st-teltest">Test</button></div>
    <div class="fieldnote" id="st-telstatus">Auth format confirmed via live testing: "Key &lt;key&gt;", not Bearer — even Telescopius's own docs tool has it wrong. Test hits their quote-of-the-day endpoint (free, no rate cost) to check both the key and browser CORS. Live target search still isn't wired up, that's on me — CSV import + deep links work today.</div>
    <h3 style="margin-top:14px">NINA Advanced API</h3>
    <label class="f">API base URL (host:port of the Advanced API plugin)</label>
    <div class="row"><input type="text" id="st-nina" value="${esc(S.nina.url)}" placeholder="http://localhost:1888" style="flex:1">
    <button class="btn small" id="st-ninatest">Test connection</button></div>
    <div class="fieldnote" id="st-ninastatus">Powers the live dashboard on Tonight and sequence push from your session plans. Use the imaging PC's IP if Night Rider 3000 runs on a different machine.</div>
    <h3 style="margin-top:14px">Feature toggles</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
    ${Object.entries(togNames).map(([k,v])=>`<label class="tog"><input type="checkbox" data-tog="${k}" ${S.toggles[k]?'checked':''}><span class="tr"></span>${v}</label>`).join('')}
    </div>
    ${S.toggles.backup?`<h3 style="margin-top:14px">Backup</h3>
    <div class="row"><button class="btn small" id="st-exp">Export all data</button>
    <button class="btn small" id="st-imp">Restore backup</button><input type="file" id="st-impfile" accept=".json" style="display:none">
    <button class="btn small danger" id="st-reset">Factory reset</button></div>`:''}
  </div>
  <div class="row" style="margin-top:4px"><button class="btn primary" id="st-save">Save settings</button></div>`;
  $('#st-save').onclick=()=>{
    L.lat=+$('#st-lat').value; L.lon=+$('#st-lon').value; L.elev=+$('#st-elev').value;
    L.sqm=+$('#st-sqm').value; L.bortle=+$('#st-bortle').value; L.source='manual'; L.name='Manually set';
    ses.altFloor=+$('#st-alt').value; ses.moonSepDefault=+$('#st-sep').value; ses.horizonOffset=+$('#st-hzo').value;
    ses.flipCostMin=+$('#st-flip').value||0; ses.nauticalBroadband=$('#st-naut').checked;
    S.keys.anthropic=$('#st-anth').value.trim(); S.keys.astrospheric=$('#st-astro').value.trim(); S.keys.telescopius=$('#st-tel').value.trim();
    const newNinaUrl=normalizeNinaUrl($('#st-nina').value);
    if(newNinaUrl!==S.nina.url) S.nina.confirmed=false;
    S.nina.url=newNinaUrl;
    S.exportMode=$('#st-exportmode').value;
    save(); toast('Settings saved.'); renderAll();
  };
  $('#st-ninatest').onclick=async()=>{
    const url=normalizeNinaUrl($('#st-nina').value);
    $('#st-nina').value=url; // reflect the stripped form immediately so it's clear what got saved
    const st=$('#st-ninastatus');
    st.innerHTML='<span class="spin"></span> testing '+esc(url)+' …';
    const tryPath=async p=>{ const r=await fetchWithTimeout(url+p,{},5000); if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); };
    try{
      let v; try{ v=await tryPath('/v2/api/version'); }catch(e1){ v=await tryPath('/api/version'); }
      const changed=S.nina.url!==url;
      S.nina.url=url; S.nina.confirmed=true; save();
      st.innerHTML='<span class="good">✓ Connected.</span> <span class="mono">'+esc(JSON.stringify(v).slice(0,160))+'</span>'+(changed?' <span class="dim">(dashboard now enabled on Tonight)</span>':'');
    }catch(e){
      if(S.nina.url===url) { S.nina.confirmed=false; save(); }
      const cors=/failed to fetch|networkerror|load failed/i.test(e.message);
      st.innerHTML='<span class="bad">✗ '+esc(e.message)+'.</span> '+(cors
        ?'Check: NINA running, Advanced API plugin installed &amp; enabled, port matches, and that this page is open in a normal browser tab (not a proxied/extension context).'
        :'Check the port in the plugin settings and that the plugin is enabled.');
    }
  };
  $('#st-anthtest').onclick=async()=>{
    const key=$('#st-anth').value.trim();
    const st=$('#st-anthstatus');
    if(!key){ st.innerHTML='<span class="bad">Paste a key first.</span>'; return; }
    const prevKey=S.keys.anthropic;
    S.keys.anthropic=key; // askClaude reads from S.keys — set temporarily so the test uses what's in the field, not necessarily what was saved
    st.innerHTML='<span class="spin"></span> testing…';
    try{
      const text=await askClaude('Reply with exactly one word: OK', 'Test', 10, 'claude-haiku-4-5-20251001');
      save(); // key worked — persist it
      st.innerHTML='<span class="good">✓ Connected — model replied: "'+esc(text.trim().slice(0,40))+'"</span>';
    }catch(e){
      S.keys.anthropic=prevKey; // don't persist a key that failed
      st.innerHTML='<span class="bad">✗ '+esc(e.message)+'</span> Check the key is copied fully and starts with sk-ant-, and that billing/credits are set up in the Console.';
    }
  };
  $('#st-astrotest').onclick=async()=>{
    const key=$('#st-astro').value.trim();
    const st=$('#st-astrostatus');
    if(!key){ st.innerHTML='<span class="bad">Paste a key first.</span>'; return; }
    if(!confirm('This makes a real forecast request and spends 5 of your 100 daily Astrospheric credits. Continue?')) return;
    const prevKey=S.keys.astrospheric;
    S.keys.astrospheric=key;
    st.innerHTML='<span class="spin"></span> testing (real request, 5 credits)…';
    try{
      const data=await fetchWeather(true);
      if(!data) throw new Error('No data returned — check the key.');
      save();
      st.innerHTML='<span class="good">✓ Connected — forecast received.</span> <span class="mono" style="font-size:11px">'+esc(JSON.stringify(data).slice(0,140))+'…</span>';
    }catch(e){
      S.keys.astrospheric=prevKey;
      st.innerHTML='<span class="bad">✗ '+esc(e.message)+'</span> Check the key is correct and hasn\u2019t been reset since it was pasted.';
    }
  };
  $('#st-teltest').onclick=async()=>{
    const key=$('#st-tel').value.trim();
    const st=$('#st-telstatus');
    if(!key){ st.innerHTML='<span class="bad">Paste a key first.</span>'; return; }
    const prevKey=S.keys.telescopius;
    S.keys.telescopius=key;
    st.innerHTML='<span class="spin"></span> testing…';
    try{
      const data=await telescopiusGet('/quote-of-the-day');
      save();
      st.innerHTML='<span class="good">✓ Connected — key and browser CORS both confirmed working.</span>'+(data&&data.text?' <span class="dim" style="font-size:11px">"'+esc(data.text.slice(0,70))+'…"</span>':'');
    }catch(e){
      S.keys.telescopius=prevKey;
      const cors=/failed to fetch|networkerror|load failed/i.test(e.message);
      st.innerHTML='<span class="bad">✗ '+esc(e.message)+'.</span> '+(cors
        ?'This is the real CORS test — curl can\u2019t check this, only a browser can. A failure here means Telescopius isn\u2019t sending back Access-Control-Allow-Origin for your GitHub Pages origin, separate from whether the key itself works.'
        :'Key or endpoint issue — the curl test that worked used the same format, so double-check the key was pasted fully.');
    }
  };
  $$('[data-pick]').forEach(b=>b.onclick=async()=>{ await pickFolder(b.dataset.pick); renderSettings(); });
  $('#st-nina-loc').onclick=async()=>{
    const st=$('#st-nina-loc-status');
    st.innerHTML='<span class="spin"></span> pulling from NINA…';
    try{
      const loc=await fetchNinaLocation();
      $('#st-lat').value=loc.lat; $('#st-lon').value=loc.lon; $('#st-elev').value=loc.elev;
      S.location.lat=loc.lat; S.location.lon=loc.lon; S.location.elev=loc.elev; S.location.source='nina'; S.location.name='Pulled from NINA'; save();
      st.innerHTML='<span class="good">✓ Pulled '+loc.lat.toFixed(4)+', '+loc.lon.toFixed(4)+'. Edit the fields below and Save to override manually.</span>';
    }catch(e){
      st.innerHTML='<span class="bad">✗ '+esc(e.message)+'</span> <details style="margin-top:4px"><summary class="dim" style="cursor:pointer;font-size:11px">raw response</summary><pre class="mono" style="font-size:10px;white-space:pre-wrap">'+esc(JSON.stringify(e.raw??{},null,1)).slice(0,800)+'</pre></details>';
    }
  };
  $$('[data-reconnect]').forEach(b=>b.onclick=async()=>{ const h=await getFolder(b.dataset.reconnect,true); toast(h?'Reconnected.':'Still not connected — try Change instead.', !h); renderSettings(); });
  $$('#page-settings [data-tog]').forEach(cb=>cb.onchange=()=>{ S.toggles[cb.dataset.tog]=cb.checked; save(); applyNavVisibility(); });
  $('#st-hrz').onclick=()=>$('#st-hrzfile').click();
  $('#st-hrzfile').onchange=async e=>{ const f=e.target.files[0]; if(!f)return;
    try{ const n=importHrz(await f.text()); S.horizonSource='imported: '+f.name; save(); toast(n+' horizon points imported.'); renderSettings(); }
    catch(err){ toast('Horizon import failed: '+err.message,true); } };
  if($('#st-hrzdel')) $('#st-hrzdel').onclick=()=>{ S.horizon=null; S.horizonSource=null; save(); renderSettings(); };
  $('#st-hrzpaste').onclick=()=>{ try{ const n=importHrz($('#st-hrztext').value); S.horizonSource='pasted manually'; save(); toast(n+' points applied.'); renderSettings(); }catch(err){ toast(err.message,true); } };
  if($('#st-exp')) $('#st-exp').onclick=async()=>{
    const d=structuredClone(S); d.keys={anthropic:'',astrospheric:'',telescopius:''};
    const name='NightRider-backup-'+new Date().toISOString().slice(0,10)+'.json';
    const handle=await getFolder('backup', true);
    if(handle){ try{ const fh=await handle.getFileHandle(name,{create:true}); const w=await fh.createWritable(); await w.write(JSON.stringify(d,null,1)); await w.close(); toast('Backup saved to '+(S.folders.backup?.name||'backup folder')+' (API keys excluded).'); return; }catch(e){ toast('Folder write failed, downloading instead: '+e.message, true); } }
    download(name, JSON.stringify(d,null,1)); toast('Backup downloaded (API keys excluded).');
  };
  if($('#st-imp')){ $('#st-imp').onclick=()=>$('#st-impfile').click();
    $('#st-impfile').onchange=async e=>{ const f=e.target.files[0]; if(!f)return;
      try{ const d=JSON.parse(await f.text()); if(!d.profiles) throw new Error('Not a Night Rider 3000 backup.');
        d.keys=S.keys; S=d; save(); toast('Backup restored.'); renderAll(); }
      catch(err){ toast('Restore failed: '+err.message,true); } }; }
  if($('#st-reset')) $('#st-reset').onclick=()=>{ if(confirm('Erase ALL Night Rider 3000 data (projects, profiles, keys)?')){ localStorage.removeItem('nightrider'); location.reload(); } };
}

/* ============ boot ============ */
window.addEventListener('DOMContentLoaded',()=>{
  try{
    initShell(); applyNavVisibility(); renderTopbar(); renderTonight();
    if(S.toggles.autoBackupOnLoad) autoBackupSilent();
  }
  catch(e){ document.body.innerHTML='<div style="padding:40px;font-family:monospace;color:#E05A4E">Boot failed: '+esc(e.message)+'<br><br>'+esc(e.stack||'')+'</div>'; }
});
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(e=>console.warn('Service worker registration failed (app still works normally, just without offline shell caching):', e));
  });
}
async function autoBackupSilent(){
  try{
    const handle=await getFolder('backup', false); // no prompt on boot; only if already granted
    if(!handle) return;
    const d=structuredClone(S); d.keys={anthropic:'',astrospheric:'',telescopius:''};
    const name='NightRider-backup-'+new Date().toISOString().slice(0,10)+'.json';
    const fh=await handle.getFileHandle(name,{create:true});
    const w=await fh.createWritable(); await w.write(JSON.stringify(d,null,1)); await w.close();
  }catch(e){ /* silent — manual backup button remains available */ }
}
</script>
</body>
</html>
